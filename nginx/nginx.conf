events {}

http {
  server {
    listen 80;

    # FastAPI — strip /study/api prefix before forwarding
    # Note: location without trailing slash avoids nginx's built-in slash redirect
    location /study/api {
      rewrite ^/study/api(/.*)$ $1 break;
      proxy_pass http://fastapi:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js SSE streaming — no buffering
    location /study/stream {
      proxy_pass http://nextjs:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
    }

    # All other Next.js pages and static assets
    # No trailing slash = nginx won't issue an automatic 301 redirect
    location /study {
      proxy_pass http://nextjs:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Redirect bare root to /study
    location = / {
      return 301 /study;
    }
  }
}
